sources:
  - name: demo_src #название схемы в БД
    description: Данные из БД авиаперелетов
    database: dwh_flight #название БД (по-умолчанию из profiles.yml)
    schema: demo_src #
    tables:
      - name: aircrafts
        description: Модели самолетов
        columns: 
          - name: aircraft_code
            description: Код модели самолета
            tests:
              - not_null
              - unique
          - name: model 
            description: модели самолета
          - name: range
            description: неизвестное поле
      - name: airports
        description: Аэропорты
        columns: 
          - name: airport_code
            description: Код аэропорта
          - name: airport_name 
            description: Название
          - name: city
            description: Город
          - name: coordinates 
            description: Координаты
          - name: timezone
            description: Таймзона
      - name: seats
        description: Места в самолете
        columns: 
          - name: aircraft_code
            description: Код модели самолета
          - name: seat_no 
            description: Номер места
          - name: fare_conditions
            description: Класс места
      - name: bookings
        columns: 
          - name: book_ref
          - name: book_date 
          - name: total_amount
        freshness:
          warn_after:
            count: 600000
            period: hour #если самая свежая запись более 6 частов в таблице - предупреждение
          error_after:
            count: 10000
            period: day # тут ошибка, если последняя запись больше 1 дня в таблице
          filter: current_timestamp::date - book_date::date < 30000 #условие для скнирования не всей таблицы
        loaded_at_field: book_date
      - name: boarding_passes
        description: Посадочные талоны
        columns: 
          - name: ticket_no
            description: Номер билета
          - name: flight_id 
            description: Номер рейса
          - name: boarding_no
            description: Нет данных
          - name: seat_no
            description: Номер места
      - name: flights
        description: Рейсы
        columns: 
          - name: flight_id
            description: ID рейса
          - name: flight_no 
            description: Номер рейса
          - name: scheduled_departure
            description: Время вылета в расписании
          - name: scheduled_arrival
            description: Время прибытия в расписании
          - name: departure_airport 
            description: Аэропорт вылета
          - name: arrival_airport
            description: Аэропорт прибытия
          - name: status 
            description: Статус рейса
          - name: aircraft_code
            description: Код модели самолета
          - name: actual_departure 
            description: Время вылета фактическое
          - name: actual_arrival
            description: Время прибытия фактическое
        freshness:
          warn_after:
            count: 600000
            period: hour
          error_after:
            count: 10000
            period: day
          filter: current_timestamp::date - actual_departure::date < 30000
        loaded_at_field: actual_departure::timestamp
      - name: ticket_flights
        description: Перелеты
        columns: 
          - name: ticket_no
            description: Номер билета
          - name: flight_id 
            description: ID рейса
          - name: fare_conditions
            description: Класс места
          - name: amount
            description: Стоимость билета
      - name: tickets
        description: Места в самолете
        columns: 
          - name: ticket_no
            description: Номер билета
          - name: book_ref 
            description: Номер бронирования
          - name: passenger_id
            description: ID пассажира
          - name: passenger_name
            description: Имя пассажира
          - name: contact_data 
            description: Номер телефона